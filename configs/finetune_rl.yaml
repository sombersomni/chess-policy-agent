model:
  d_model: 128
  n_heads: 8
  n_layers: 6
  dim_feedforward: 512
  dropout: 0.1

decoder:
  d_model: 128
  n_heads: 8
  n_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  max_seq_len: 512
  move_vocab_size: 1971

finetune:
  ema_alpha: 0.995
  shadow_update_every_n_games: 50
  t_policy: 0.3
  t_opponent: 1.0
  gamma: 0.99
  lambda_kl: 0.1
  n_games_per_update: 10
  max_ply: 200
  learning_rate: 1.0e-5
  gradient_clip: 1.0
  n_updates: 500
  seed: 42
  use_structural_mask: false
  checkpoint_in: checkpoints/chess_rl_v4_100k_both.pt
  checkpoint_out: checkpoints/chess_rl_finetune.pt

aim:
  enabled: false
  experiment_name: finetune_rl
  repo: .aim
  log_every_n_steps: 10
