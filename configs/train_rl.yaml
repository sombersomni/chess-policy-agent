data:
  pgn:       data/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 1000

model:
  d_model:         128
  n_heads:         8
  n_layers:        6
  dim_feedforward: 512
  dropout:         0.1

decoder:
  d_model:         128
  n_heads:         8
  n_layers:        4
  dim_feedforward: 512
  dropout:         0.1
  max_seq_len:     512
  move_vocab_size: 1971

rl:
  learning_rate:        0.0001
  weight_decay:         0.01
  warmup_fraction:      0.05
  decay_start_fraction: 0.5
  min_lr:               0.00001
  gradient_clip:        1.0
  epochs:               20
  checkpoint:           checkpoints/chess_rl.pt
  resume:               ""
  gamma:                0.99
  win_reward:           10.0
  loss_reward:          -10.0
  draw_reward:          2.0
  lambda_ce:            0.0
  lambda_awbc:          1.0
  lambda_entropy:       0.01
  awbc_eps:             1.0e-8
  label_smoothing:      0.1
  train_color:          white
  lambda_value:         1.0
  value_lr_multiplier:  5.0

aim:
  enabled:           true
  experiment_name:   chess_rl
  repo:              .aim
  log_every_n_steps: 10
