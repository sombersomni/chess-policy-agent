data:
  pgn:       data/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 10

model:
  d_model:         128
  n_heads:         8
  n_layers:        6
  dim_feedforward: 512
  dropout:         0.1

decoder:
  d_model:         128
  n_heads:         8
  n_layers:        4
  dim_feedforward: 512
  dropout:         0.1
  max_seq_len:     512
  move_vocab_size: 1971

rl:
  learning_rate:        0.0001
  weight_decay:         0.01
  warmup_fraction:      0.05
  decay_start_fraction: 0.5
  min_lr:               0.00001
  gradient_clip:        1.0
  epochs:               1
  checkpoint:           ""
  resume:               ""
  gamma:                0.99
  win_reward:           1.0
  loss_reward:          -1.0
  draw_reward:          0.0
  lambda_material:      0.01
  lambda_check:         0.1
  lambda_ce:            0.5
  label_smoothing:      0.1

aim:
  enabled:           true
  experiment_name:   chess_rl_smoke
  repo:              .aim
  log_every_n_steps: 1
