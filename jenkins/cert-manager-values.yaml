# Helm values for cert-manager.
# installCRDs bundles CRD installation into the Helm release so a separate
# kubectl apply step is not required.
# installCRDs is deprecated in cert-manager >= v1.15; use crds.enabled instead.
crds:
  enabled: true

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

webhook:
  resources:
    requests:
      cpu: 30m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

cainjector:
  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
