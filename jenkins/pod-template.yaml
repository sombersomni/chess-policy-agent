# ============================================================
# Jenkins K8s agent pod template for chess-sim CI builds.
#
# Referenced by Jenkinsfile via: yamlFile 'jenkins/pod-template.yaml'
#
# Replace YOUR_GITHUB_USERNAME, e.g.:
#   image: ghcr.io/sombersomni/chess-sim:ci
#
# imagePullSecrets references the K8s secret created via gh CLI
# (avoids storing a long-lived PAT — uses your active gh auth session):
#   kubectl create secret docker-registry ghcr-secret \
#     --namespace jenkins \
#     --docker-server=ghcr.io \
#     --docker-username=$(gh api user --jq .login) \
#     --docker-password=$(gh auth token)
#
# The 'chess-sim' container runs the lint and test stages.
# The default 'jnlp' sidecar (added automatically by the K8s plugin)
# handles the Jenkins agent connection — no extra config needed.
# ============================================================

apiVersion: v1
kind: Pod
metadata:
  labels:
    app: chess-sim-ci
spec:
  imagePullSecrets:
    - name: ghcr-secret
  containers:
    - name: chess-sim
      image: ghcr.io/sombersomni/chess-sim:ci-latest
      command: ["sleep"]
      args: ["infinity"]
      env:
        # Force CPU-only mode — tests must not require a GPU
        - name: CUDA_VISIBLE_DEVICES
          value: ""
        - name: TORCH_DEVICE
          value: "cpu"
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
