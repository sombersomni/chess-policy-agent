# configs/preprocess_v2.yaml
input:
  pgn_path: data/raw/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 0  # 0 = all games

output:
  hdf5_path: data/processed/chess_dataset.h5
  chunk_size: 1000
  compression: gzip
  compression_opts: 4
  max_seq_len: 512

filter:
  min_elo: 0
  min_moves: 5
  max_moves: 512
  winners_only: false

split:
  train: 0.95
  val: 0.05
  seed: 42

processing:
  workers: 4
