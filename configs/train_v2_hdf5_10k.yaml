data:
  hdf5_path: data/processed/chess_10k.h5
  batch_size: 128
  num_workers: 4

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  dim_feedforward: 1024
  dropout: 0.1

decoder:
  d_model: 256
  n_heads: 8
  n_layers: 4
  dim_feedforward: 1024
  dropout: 0.1
  max_seq_len: 512
  move_vocab_size: 1971

trainer:
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_steps: 500
  gradient_clip: 1.0
  epochs: 10
  checkpoint: checkpoints/chess_v2_hdf5_10k.pt

