data:
  pgn: data/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 10000
  batch_size: 64
  train_frac: 0.9
  winners_only: false

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  dim_feedforward: 1024
  dropout: 0.1

decoder:
  d_model: 256
  n_heads: 8
  n_layers: 4
  dim_feedforward: 1024
  dropout: 0.1
  max_seq_len: 512
  move_vocab_size: 1971

trainer:
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_steps: 500
  gradient_clip: 1.0
  epochs: 10
  checkpoint: checkpoints/chess_v2_10k.pt
