# Training configuration — 50k-game Lichess run
# Resume from the 20k checkpoint and train for 10 more epochs.
#
# Usage:
#   python -m scripts.train_real --config configs/train_50k.yaml
#
# CLI overrides are supported, e.g.:
#   python -m scripts.train_real --config configs/train_50k.yaml --epochs 5

data:
  pgn: "data/lichess_db_standard_rated_2013-01.pgn.zst"
  num_games: 20          # unused when pgn is set
  max_games: 50000
  winners_only: false
  chunk_size: 1024
  num_workers: 2
  train_frac: 0.9
  batch_size: 128

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  dim_feedforward: 1024
  dropout: 0.1

trainer:
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  gradient_clip: 1.0
  patience: 3
  epochs: 10
  resume: "checkpoints/lichess_20k_v3.pt"
  checkpoint: "checkpoints/lichess_50k_v1.pt"
