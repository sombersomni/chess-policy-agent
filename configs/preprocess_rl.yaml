input:
  pgn_path: data/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 1000

output:
  hdf5_path:        data/processed/chess_rl.h5
  chunk_size:       1000
  compression:      gzip
  compression_opts: 4
  max_prefix_len:   512

filter:
  min_moves:   5
  max_moves:   512
  train_color: white

split:
  train: 0.95
  val:   0.05
  seed:  42

processing:
  workers: 4
