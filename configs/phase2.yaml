model:
  d_model: 128
  n_heads: 8
  n_layers: 6
  dim_feedforward: 512
  dropout: 0.1

decoder:
  d_model: 128
  n_heads: 8
  n_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  max_seq_len: 512
  move_vocab_size: 1971

phase2:
  ema_alpha:           0.995
  gamma:               0.99
  lambda_surprise:     0.5
  draw_reward:         0.1
  episodes_per_update: 1
  max_episode_steps:   400
  win_reward:          1.0
  loss_reward:         -1.0
  pretrained_ckpt:     checkpoints/chess_v2_1k.pt
  lambda_material:     0.1
  lambda_illegal:      0.0
  lambda_check:        0.1
  truncation_reward:   -0.05
