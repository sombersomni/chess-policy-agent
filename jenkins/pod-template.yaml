# ============================================================
# Jenkins K8s agent pod template for chess-sim CI builds.
#
# Referenced by Jenkinsfile via: yamlFile 'jenkins/pod-template.yaml'
#
# Containers:
#   chess-sim — runs lint and test stages (ci-latest image)
#   kaniko    — builds + pushes CI images without a Docker daemon
#   jnlp      — Jenkins agent sidecar (memory override)
#
# imagePullSecrets references the K8s secret created via gh CLI:
#   kubectl create secret docker-registry ghcr-secret \
#     --namespace jenkins \
#     --docker-server=ghcr.io \
#     --docker-username=$(gh api user --jq .login) \
#     --docker-password=$(gh auth token)
# ============================================================

apiVersion: v1
kind: Pod
metadata:
  labels:
    app: chess-sim-ci
spec:
  imagePullSecrets:
    - name: ghcr-secret
  containers:
    - name: chess-sim
      image: ghcr.io/sombersomni/chess-sim:ci-latest
      imagePullPolicy: Always
      command: ["sleep"]
      args: ["infinity"]
      env:
        - name: CUDA_VISIBLE_DEVICES
          value: ""
        - name: TORCH_DEVICE
          value: "cpu"
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
    - name: kaniko
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
      imagePullPolicy: IfNotPresent
      command: ["sleep"]
      args: ["infinity"]
      volumeMounts:
        - name: kaniko-secret
          mountPath: /kaniko/.docker
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
    - name: jnlp
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
  volumes:
    - name: kaniko-secret
      secret:
        secretName: ghcr-secret
        items:
          - key: .dockerconfigjson
            path: config.json
