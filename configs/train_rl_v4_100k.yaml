data:
  pgn:       data/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 100000

model:
  d_model:         128
  n_heads:         8
  n_layers:        6
  dim_feedforward: 512
  dropout:         0.1

decoder:
  d_model:         128
  n_heads:         8
  n_layers:        4
  dim_feedforward: 512
  dropout:         0.1
  max_seq_len:     512
  move_vocab_size: 1971

rl:
  learning_rate:        0.0001
  weight_decay:         0.01
  warmup_fraction:      0.05
  decay_start_fraction: 0.65
  min_lr:               0.00001
  gradient_clip:        1.0
  epochs:               30
  checkpoint:           checkpoints/chess_rl_v4_100k.pt
  resume:               ""
  lambda_outcome:       1.0
  lambda_material:      0.1
  draw_reward_norm:     0.5
  lambda_ce:            0.0
  lambda_awbc:              0.0
  lambda_rsbc:              1.0
  lambda_entropy:           0.0
  awbc_eps:             1.0e-8
  label_smoothing:          0.0
  rsbc_normalize_per_game:  true
  train_color:          white
  balance_outcomes:     true
  loser_ply_weight:     0.1
  use_structural_mask:  true
  max_plies_per_game:   150
  rsce_r_ref:           0.0
  hdf5_path:            data/chess_rl_v4_100k.h5
  batch_size:           512
  num_workers:          4
  val_split_fraction:   0.1
  hdf5_chunk_size:      1024

aim:
  enabled:           true
  experiment_name:   chess_rl_v4_100k_30ep
  repo:              .aim
  log_every_n_steps: 10
