# Training configuration — full shard cache run
# Resumes from lichess_50k_v1.pt and trains for 20 more epochs
# on all 49 cached shards (~3.3M examples).
#
# Usage:
#   python -m scripts.train_real --config configs/train_full.yaml

data:
  pgn: "data/lichess_db_standard_rated_2013-01.pgn.zst"
  max_games: 0          # use all cached shards (no limit)
  winners_only: false
  chunk_size: 1024
  num_workers: 2
  train_frac: 0.9
  batch_size: 128

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  dim_feedforward: 1024
  dropout: 0.1

trainer:
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  gradient_clip: 1.0
  patience: 3
  epochs: 20
  resume: "checkpoints/lichess_50k_v1.pt"
  checkpoint: "checkpoints/lichess_full_v1.pt"
