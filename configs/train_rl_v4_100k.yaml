data:
  pgn:       data/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 100000

model:
  d_model:         128
  n_heads:         8
  n_layers:        6
  dim_feedforward: 512
  dropout:         0.1

decoder:
  d_model:         128
  n_heads:         8
  n_layers:        4
  dim_feedforward: 512
  dropout:         0.1
  max_seq_len:     512
  move_vocab_size: 1971

rl:
  learning_rate:        0.0001
  weight_decay:         0.01
  warmup_fraction:      0.05
  decay_start_fraction: 0.50
  min_lr:               0.00001
  gradient_clip:        1.0
  epochs:               100
  checkpoint:           checkpoints/chess_rl_v4_100k_100ep.pt
  resume:               ""
  label_smoothing:      0.0
  train_color:          both
  use_structural_mask:  true
  max_plies_per_game:   150
  hdf5_path:            data/chess_rl_v4_100k_both.h5
  batch_size:           512
  num_workers:          4
  val_split_fraction:   0.1
  hdf5_chunk_size:      1024
  use_aux_heads:        true
  lambda_capture:       0.5
  lambda_category:      0.2
  lambda_phase:         0.05

aim:
  enabled:           true
  experiment_name:   chess_rl_v4_100k_100ep
  repo:              .aim
  log_every_n_steps: 10
