data:
  pgn: data/lichess_db_standard_rated_2013-01.pgn.zst
  max_games: 1000
  batch_size: 64
  winners_only: true

model:
  d_model: 128
  n_heads: 8
  n_layers: 6
  dim_feedforward: 512
  dropout: 0.1

decoder:
  d_model: 128
  n_heads: 8
  n_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  max_seq_len: 512
  move_vocab_size: 1971

eval:
  checkpoint: checkpoints/chess_v2_1k.pt
  top_n: 5
